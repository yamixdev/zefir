on:
  push:
    - workflows: deploy-function-workflow
      filter:
        branches: ["main", "master"]
  pull_request:
    - workflows: deploy-function-workflow
      filter:
        source_branches: ["**", "!test**"]
        target_branches: "main"

tokens:
  SERVICE_CONNECTION_WITH_TOKEN:
    service_connection: "default-service-connection"
    scope: org

workflows:
  deploy-function-workflow:
    inputs:
      function-name:
        type: string
        required: true
        description: "Имя функции в Yandex Cloud (только латинские буквы, цифры и дефисы)"
      environment-vars:
        type: string
        default: ""
        description: "Переменные окружения в формате KEY1=value1,KEY2=value2"
      make-public:
        type: boolean
        default: true
        description: "Сделать функцию публичной (требуются права functions.admin)"
    env:
      YC_FUNCTION_NAME: ${{ inputs.function-name }}
    tasks:
      - name: deploy-function-task
        cubes:
          - name: validate-function-name
            script:
              - |
                # Проверяем имя функции
                if ! echo "$YC_FUNCTION_NAME" | grep -qE '^[a-z][-a-z0-9]{0,61}[a-z0-9]$'; then
                  echo "❌ Ошибка: Имя функции должно соответствовать паттерну: /^[a-z][-a-z0-9]{0,61}[a-z0-9]$/"
                  echo "   Пример: my-function, test-api, hello-world"
                  exit 1
                fi
                echo "✅ Имя функции валидно: $YC_FUNCTION_NAME"
                
          - name: deploy-function
            env:
              ID_TOKEN: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.id_token }}
              YC_SA_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.service_account_id }}
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.folder_id }}
              YC_FUNCTION_RUNTIME: nodejs22
              YC_FUNCTION_ENTRYPOINT: index.handler
              SOURCE_PATH: "./src"
              ENVIRONMENT: ${{ inputs.environment-vars }}
              PUBLIC: ${{ inputs.make-public }}
            image: cr.yandex/sourcecraft/yc-function:latest
            
          - name: get-function-info
            env:
              ID_TOKEN: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.id_token }}
              YC_FOLDER_ID: ${{ tokens.SERVICE_CONNECTION_WITH_TOKEN.folder_id }}
            script:
              - |
                # Получаем информацию о функции
                echo "🔧 Информация о развернутой функции:"
                echo "📝 Имя функции: $YC_FUNCTION_NAME"
                echo "🔗 Invoke URL: ${{ cubes.deploy-function.outputs.invoke_url }}"
                echo "📍 Deployment Location: ${{ cubes.deploy-function.outputs.deployment_location }}"
                echo ""
                echo "📋 Переменные окружения:"
                if [ -n "${{ inputs.environment-vars }}" ]; then
                  echo "${{ inputs.environment-vars }}" | tr ',' '\n' | while read -r var; do
                    if [ -n "$var" ]; then
                      key=$(echo "$var" | cut -d'=' -f1)
                      echo "   • $key: [установлено]"
                    fi
                  done
                else
                  echo "   • Не установлены"
                fi
                echo ""
                echo "🚀 Функция успешно развернута!"
                echo "📚 Документация: https://cloud.yandex.ru/docs/functions/"
                
          - name: save-outputs
            script:
              - |
                echo "invoke_url=${{ cubes.deploy-function.outputs.invoke_url }}" > invoke_url.txt
                echo "deployment_location=${{ cubes.deploy-function.outputs.deployment_location }}" > deployment_location.txt
                echo "function_name=$YC_FUNCTION_NAME" > function_name.txt
            artifacts:
              paths:
                - invoke_url.txt
                - deployment_location.txt
                - function_name.txt